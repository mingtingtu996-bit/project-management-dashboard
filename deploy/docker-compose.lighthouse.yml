services:
  api:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: project-management-api
    network_mode: host
    restart: unless-stopped
    env_file:
      - ./env/server.production.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      LOG_DIR: /app/logs
      LOG_FILE_PATH: /app/logs/server.log
    volumes:
      - ./data/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ../client
      dockerfile: Dockerfile
      args:
        VITE_STORAGE_MODE: backend
        VITE_API_BASE_URL: /api
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: project-management-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./nginx/lighthouse.conf:/etc/nginx/conf.d/default.conf:ro
