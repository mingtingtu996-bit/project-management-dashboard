name: Deploy Project Management System

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - preview
          - staging
          - production

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  client-quality:
    name: Client Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install client dependencies
        run: pnpm --dir client install --frozen-lockfile

      - name: Client lint
        run: pnpm --dir client run lint

      - name: Client typecheck
        run: pnpm --dir client run typecheck

      - name: Client tests
        run: pnpm --dir client run test:run

  server-quality:
    name: Server Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci --workspaces=false

      - name: Server typecheck
        run: npm run typecheck

      - name: Server executeSQL guard
        run: npm run guard:execute-sql

      - name: Server tests
        working-directory: .
        run: npx --prefix server vitest run --root server

      - name: Server build
        run: npm run build

  build-frontend:
    name: Build Frontend Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [client-quality, server-quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install client dependencies
        run: pnpm --dir client install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir client run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: client/dist
          retention-days: 7

  browser-checks:
    name: Browser Checks (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-frontend]
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: Shell And Collab
            key: shell-and-collab
            script: verify:browser-suite:shell-and-collab
          - name: Project Chains
            key: project-chains
            script: verify:browser-suite:project-chains
          - name: Planning And Tooling
            key: planning-and-tooling
            script: verify:browser-suite:planning-and-tooling
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci --no-fund

      - name: Download frontend build
        uses: actions/download-artifact@v7
        with:
          name: frontend-build
          path: client/dist

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser suite
        run: npm run ${{ matrix.suite.script }}
        env:
          BROWSER_SUITE_KEY: ${{ matrix.suite.key }}

      - name: Publish browser suite summary
        if: always()
        run: node scripts/write-browser-suite-summary.mjs artifacts/browser-checks/suite-manifest.json >> $GITHUB_STEP_SUMMARY

      - name: Upload browser suite artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: browser-check-${{ matrix.suite.key }}
          path: artifacts/browser-checks
          if-no-files-found: error
          retention-days: 5

  browser-checks-summary:
    name: Browser Checks Overview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [browser-checks]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci --no-fund

      - name: Download browser suite artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: browser-check-*
          path: browser-artifacts
          merge-multiple: false

      - name: Publish browser checks overview
        run: node scripts/write-browser-overview-summary.mjs browser-artifacts >> $GITHUB_STEP_SUMMARY

  database-migration:
    name: Apply Pending Database Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [server-quality]
    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment != 'preview')
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci --workspaces=false

      - name: Check migration connection secret
        id: migration-config
        run: |
          if [ -n "${DATABASE_URL}" ]; then
            echo "::add-mask::${DATABASE_URL}"
            echo "DATABASE_URL=${DATABASE_URL}" >> "$GITHUB_ENV"
            echo "can_run=true" >> "$GITHUB_OUTPUT"
            echo "connection_source=SUPABASE_MIGRATION_URL" >> "$GITHUB_OUTPUT"
          elif { [ -n "${SUPABASE_HOST}" ] || [ -n "${SUPABASE_URL}" ]; } && [ -n "${SUPABASE_PASSWORD}" ]; then
            node <<'NODE'
          const fs = require('node:fs')
          const { Client } = require('pg')

          const supabaseHost = process.env.SUPABASE_HOST
          const supabaseUrl = process.env.SUPABASE_URL
          const password = process.env.SUPABASE_PASSWORD
          const configuredPoolerPort = String(process.env.SUPABASE_POOLER_PORT || '').trim()
          const poolerPorts = configuredPoolerPort ? [configuredPoolerPort] : ['6543', '5432']

          function deriveProjectRef(value) {
            const text = String(value || '').trim()
            if (!text) return null

            let hostname = text
            try {
              const url = new URL(text)
              const dashboardMatch = url.pathname.match(/\/project\/([^/?#]+)/)
              if (dashboardMatch?.[1]) return dashboardMatch[1]
              hostname = url.hostname
            } catch {
              hostname = text.replace(/^https?:\/\//, '').split('/')[0].split(':')[0]
            }

            const parts = hostname.split('.').filter(Boolean)
            if (parts[0] === 'db' && parts[1]) return parts[1]
            if (parts.length >= 3 && parts.at(-2) === 'supabase' && parts.at(-1) === 'co') {
              return parts[0]
            }

            return null
          }

          const projectRef = deriveProjectRef(supabaseHost) || deriveProjectRef(supabaseUrl)
          if (!projectRef) {
            throw new Error('Unable to derive Supabase project ref from SUPABASE_HOST or SUPABASE_URL')
          }

          const role = String(process.env.SUPABASE_USER || 'postgres').trim()
          const poolerUser = role.includes('.') ? role : `${role}.${projectRef}`
          const user = encodeURIComponent(poolerUser)
          const encodedPassword = encodeURIComponent(password)

          const configuredPoolerHost = String(process.env.SUPABASE_POOLER_HOST || '').trim()
          const poolerHosts = [
            configuredPoolerHost,
            'aws-0-ap-southeast-1.pooler.supabase.com',
            'aws-0-ap-southeast-2.pooler.supabase.com',
            'aws-0-ap-northeast-1.pooler.supabase.com',
            'aws-0-ap-northeast-2.pooler.supabase.com',
            'aws-0-ap-south-1.pooler.supabase.com',
            'aws-0-us-east-1.pooler.supabase.com',
            'aws-0-us-west-1.pooler.supabase.com',
            'aws-0-us-west-2.pooler.supabase.com',
            'aws-0-ca-central-1.pooler.supabase.com',
            'aws-0-eu-west-1.pooler.supabase.com',
            'aws-0-eu-west-2.pooler.supabase.com',
            'aws-0-eu-west-3.pooler.supabase.com',
            'aws-0-eu-central-1.pooler.supabase.com',
            'aws-0-eu-north-1.pooler.supabase.com',
            'aws-0-sa-east-1.pooler.supabase.com',
            'aws-0-af-south-1.pooler.supabase.com',
            'aws-0-me-central-1.pooler.supabase.com',
          ].filter(Boolean)

          const uniquePoolerHosts = [...new Set(poolerHosts)]

          async function canConnect(connectionString) {
            const client = new Client({
              connectionString,
              ssl: { rejectUnauthorized: false },
              connectionTimeoutMillis: 7000,
              query_timeout: 7000,
              statement_timeout: 7000,
            })

            try {
              await client.connect()
              await client.query('select 1')
              return true
            } finally {
              await client.end().catch(() => {})
            }
          }

          ;(async () => {
            for (const poolerHost of uniquePoolerHosts) {
              for (const poolerPort of poolerPorts) {
                const connectionString = `postgresql://${user}:${encodedPassword}@${poolerHost}:${poolerPort}/postgres`
                console.log(`::add-mask::${connectionString}`)

                try {
                  if (await canConnect(connectionString)) {
                    console.log(`Using Supabase pooler host ${poolerHost}:${poolerPort} for migrations`)
                    fs.appendFileSync(process.env.GITHUB_ENV, `DATABASE_URL=${connectionString}\n`)
                    return
                  }
                } catch (error) {
                  console.log(`Pooler candidate ${poolerHost}:${poolerPort} rejected: ${error.message}`)
                }
              }
            }

            throw new Error('Unable to connect to any known Supabase pooler host; set SUPABASE_MIGRATION_URL or SUPABASE_POOLER_HOST.')
          })().catch((error) => {
            console.error(error)
            process.exit(1)
          })
          NODE
            echo "can_run=true" >> "$GITHUB_OUTPUT"
            echo "connection_source=SUPABASE pooler URL" >> "$GITHUB_OUTPUT"
          else
            echo "can_run=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Database migration skipped"
              echo ""
              echo "- Missing migration database credentials."
              echo "- Provide \`SUPABASE_MIGRATION_URL\`, or provide \`SUPABASE_HOST\`/\`SUPABASE_URL\` plus \`SUPABASE_PASSWORD\` so CI can use the Supabase pooler."
              echo "- Deployment will continue without applying migrations in CI."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_MIGRATION_URL }}
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DATABASE: ${{ secrets.SUPABASE_DATABASE }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
          SUPABASE_POOLER_PORT: ${{ secrets.SUPABASE_POOLER_PORT }}

      - name: Apply pending migrations
        if: steps.migration-config.outputs.can_run == 'true'
        run: npm run migrate:pending
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DATABASE: ${{ secrets.SUPABASE_DATABASE }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

  deploy-server:
    name: Deploy To Self-hosted Server
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-frontend, browser-checks, browser-checks-summary, database-migration]
    env:
      DEPLOY_TARGET: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}
      HAS_SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK != '' }}
    if: >
      always() &&
      needs.build-frontend.result == 'success' &&
      needs.browser-checks.result == 'success' &&
      needs.browser-checks-summary.result == 'success' &&
      (needs.database-migration.result == 'success' || needs.database-migration.result == 'skipped') &&
      (
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.environment != 'preview')
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check server deployment credentials
        id: deployment-eligibility
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_PATH" ] && [ -n "$DEPLOY_SSH_PRIVATE_KEY" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Self-hosted deployment blocked"
              echo ""
              echo "- Missing one or more required GitHub secrets: \`DEPLOY_HOST\`, \`DEPLOY_USER\`, \`DEPLOY_PATH\`, \`DEPLOY_SSH_PRIVATE_KEY\`."
              echo "- Quality gates and browser checks completed, but no server deployment was attempted."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Configure SSH
        if: ${{ steps.deployment-eligibility.outputs.can_deploy == 'true' }}
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/project-management-deploy
          chmod 600 ~/.ssh/project-management-deploy

          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          fi

      - name: Deploy to self-hosted server
        if: ${{ steps.deployment-eligibility.outputs.can_deploy == 'true' }}
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_HEALTH_URL: ${{ secrets.DEPLOY_HEALTH_URL }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          ssh \
            -i ~/.ssh/project-management-deploy \
            -p "$DEPLOY_PORT" \
            -o IdentitiesOnly=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=40 \
            -o TCPKeepAlive=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR=\"$DEPLOY_PATH\" RELEASE_SHA=\"$RELEASE_SHA\" HEALTH_URL=\"${DEPLOY_HEALTH_URL:-http://127.0.0.1/api/health}\" bash -s" < scripts/deploy-lighthouse-server.sh

      - name: Send deployment notification
        if: ${{ env.HAS_SLACK_WEBHOOK == 'true' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: '#deployments'
          SLACK_COLOR: good
          SLACK_TITLE: 'Project Management System deployed to self-hosted server'
          SLACK_MESSAGE: 'Commit: ${{ github.sha }}\nEnvironment: ${{ env.DEPLOY_TARGET }}'
