name: Deploy Project Management System

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - preview
          - staging
          - production

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  client-quality:
    name: Client Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install client dependencies
        run: pnpm --dir client install --frozen-lockfile

      - name: Client lint
        run: pnpm --dir client run lint

      - name: Client typecheck
        run: pnpm --dir client run typecheck

      - name: Client tests
        run: pnpm --dir client run test:run

  server-quality:
    name: Server Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci --workspaces=false

      - name: Server typecheck
        run: npm run typecheck

      - name: Server executeSQL guard
        run: npm run guard:execute-sql

      - name: Server tests
        working-directory: .
        run: npx --prefix server vitest run --root server

      - name: Server build
        run: npm run build

  build-frontend:
    name: Build Frontend Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [client-quality, server-quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install client dependencies
        run: pnpm --dir client install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir client run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: client/dist
          retention-days: 7

  browser-checks:
    name: Browser Checks (${{ matrix.suite.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-frontend]
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: Shell And Collab
            key: shell-and-collab
            script: verify:browser-suite:shell-and-collab
          - name: Project Chains
            key: project-chains
            script: verify:browser-suite:project-chains
          - name: Planning And Tooling
            key: planning-and-tooling
            script: verify:browser-suite:planning-and-tooling
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci --no-fund

      - name: Download frontend build
        uses: actions/download-artifact@v7
        with:
          name: frontend-build
          path: client/dist

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser suite
        run: npm run ${{ matrix.suite.script }}
        env:
          BROWSER_SUITE_KEY: ${{ matrix.suite.key }}

      - name: Publish browser suite summary
        if: always()
        run: node scripts/write-browser-suite-summary.mjs artifacts/browser-checks/suite-manifest.json >> $GITHUB_STEP_SUMMARY

      - name: Upload browser suite artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: browser-check-${{ matrix.suite.key }}
          path: artifacts/browser-checks
          if-no-files-found: error
          retention-days: 5

  browser-checks-summary:
    name: Browser Checks Overview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [browser-checks]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci --no-fund

      - name: Download browser suite artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: browser-check-*
          path: browser-artifacts
          merge-multiple: false

      - name: Publish browser checks overview
        run: node scripts/write-browser-overview-summary.mjs browser-artifacts >> $GITHUB_STEP_SUMMARY

  database-migration:
    name: Apply Pending Database Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [server-quality]
    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment != 'preview')
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci --workspaces=false

      - name: Check migration connection secret
        id: migration-config
        run: |
          if [ -n "${DATABASE_URL}" ]; then
            echo "can_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_run=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Database migration skipped"
              echo ""
              echo "- Missing \`SUPABASE_MIGRATION_URL\` GitHub secret."
              echo "- Hosted GitHub runners cannot reach the current IPv6-only direct Supabase database host."
              echo "- Deployment will continue without applying migrations in CI."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_MIGRATION_URL }}

      - name: Apply pending migrations
        if: steps.migration-config.outputs.can_run == 'true'
        run: npm run migrate:pending
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_MIGRATION_URL }}

  deploy-cloudbase:
    name: Deploy To CloudBase
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-frontend, browser-checks, browser-checks-summary, database-migration]
    env:
      DEPLOY_TARGET: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}
      HAS_SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK != '' }}
    if: >
      always() &&
      needs.build-frontend.result == 'success' &&
      needs.browser-checks.result == 'success' &&
      needs.browser-checks-summary.result == 'success' &&
      (needs.database-migration.result == 'success' || needs.database-migration.result == 'skipped') &&
      (
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Download frontend build
        uses: actions/download-artifact@v7
        with:
          name: frontend-build
          path: dist

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Check deployment credentials
        id: deployment-eligibility
        env:
          CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
          CLOUDBASE_SECRET_ID: ${{ secrets.CLOUDBASE_SECRET_ID }}
          CLOUDBASE_SECRET_KEY: ${{ secrets.CLOUDBASE_SECRET_KEY }}
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: |
          HAS_ENV_ID=false
          HAS_CLOUDBASE_CREDS=false
          HAS_TENCENT_CREDS=false

          if [ -n "$CLOUDBASE_ENV_ID" ]; then
            HAS_ENV_ID=true
          fi

          if [ -n "$CLOUDBASE_SECRET_ID" ] && [ -n "$CLOUDBASE_SECRET_KEY" ]; then
            HAS_CLOUDBASE_CREDS=true
          fi

          if [ -n "$TENCENT_SECRET_ID" ] && [ -n "$TENCENT_SECRET_KEY" ]; then
            HAS_TENCENT_CREDS=true
          fi

          if [ "$HAS_ENV_ID" = true ] && { [ "$HAS_CLOUDBASE_CREDS" = true ] || [ "$HAS_TENCENT_CREDS" = true ]; }; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            echo "CloudBase deployment skipped because required secrets are missing."
          fi

      - name: Login CloudBase
        if: ${{ steps.deployment-eligibility.outputs.can_deploy == 'true' }}
        env:
          CLOUDBASE_SECRET_ID: ${{ secrets.CLOUDBASE_SECRET_ID }}
          CLOUDBASE_SECRET_KEY: ${{ secrets.CLOUDBASE_SECRET_KEY }}
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: |
          API_KEY_ID="${CLOUDBASE_SECRET_ID:-$TENCENT_SECRET_ID}"
          API_KEY="${CLOUDBASE_SECRET_KEY:-$TENCENT_SECRET_KEY}"
          if [ -z "$API_KEY_ID" ] || [ -z "$API_KEY" ]; then
            echo "CloudBase credentials are not configured."
            exit 1
          fi
          tcb login \
            --apiKeyId "$API_KEY_ID" \
            --apiKey "$API_KEY"

      - name: Deploy frontend
        if: ${{ steps.deployment-eligibility.outputs.can_deploy == 'true' }}
        run: tcb hosting:deploy dist --envId ${{ secrets.CLOUDBASE_ENV_ID }}

      - name: Deploy backend CloudRun service
        if: ${{ steps.deployment-eligibility.outputs.can_deploy == 'true' }}
        env:
          CLOUDBASE_ENV_ID: ${{ secrets.CLOUDBASE_ENV_ID }}
          CLOUDBASE_BACKEND_SERVICE: project-management-api
          CLOUDBASE_BACKEND_PORT: '3001'
        run: node scripts/deploy-cloudbase-backend.mjs

      - name: Send deployment notification
        if: ${{ env.HAS_SLACK_WEBHOOK == 'true' }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: '#deployments'
          SLACK_COLOR: good
          SLACK_TITLE: 'Project Management System deployed to CloudBase'
          SLACK_MESSAGE: 'Commit: ${{ github.sha }}\nEnvironment: ${{ env.DEPLOY_TARGET }}'
